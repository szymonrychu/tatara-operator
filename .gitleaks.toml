# gitleaks configuration for tatara-operator.
#
# Extends the bundled default ruleset (all real secret detections stay active on
# source code) and adds a narrow allowlist for MEMORY.md.
#
# MEMORY.md is a curated, human/agent-authored design-notes document. By policy
# it never contains credentials, but its dense prose (entries that use words like
# "KEY", "secret" or "token" next to slash-laden identifiers) reliably trips the
# generic-api-key heuristic, producing false positives that fail the secscan and
# pre-commit gitleaks gates. Allowlisting the file keeps the gate green without
# weakening secret scanning anywhere else in the tree.
[extend]
useDefault = true

[[allowlists]]
description = "MEMORY.md is curated prose notes, not source; exempt from secret scanning to avoid false positives"
paths = [
  '''(^|/)MEMORY\.md$''',
]

apiVersion: tatara.dev/v1alpha1
kind: Project
metadata: {name: tatara, namespace: tatara}
spec:
  scmSecretRef: tatara-scm
  triggerLabel: tatara
  maxConcurrentTasks: 2
  agent:
    image: harbor.szymonrichert.pl/containers/tatara-claude-code-wrapper:0.1.13
    model: claude-opus-4-8
    permissionMode: bypassPermissions
    # Optional lifecycle hooks: shell commands the wrapper runs via `sh -c` at
    # fixed points. Best-effort - a non-zero exit is logged and counted but never
    # aborts the agent run. preClone gets the repo URL as $1 (and
    # $TATARA_HOOK_REPO_URL); postClone gets the clone dir as $1 (and
    # $TATARA_HOOK_CLONE_DEST). The conversation/turn hooks see $TATARA_TASK /
    # $TATARA_PROJECT (and agentTurnFinished sees $TATARA_TURN_ID).
    # hooks:
    #   preClone: 'echo "about to clone $1"'
    #   postClone: 'git -C "$1" lfs pull || true'
    #   conversationStart: 'echo "session $TATARA_TASK starting"'
    #   conversationRestart: 'echo "session $TATARA_TASK resumed"'
    #   agentTurnFinished: 'echo "turn $TATARA_TURN_ID done"'
    #   conversationFinished: 'echo "session $TATARA_TASK finished"'
    # Optional pod-shaping extras, applied straight to the agent Pod / wrapper
    # container. extraEnvs are appended AFTER the operator's own vars (so they
    # cannot shadow a required one).
    # extraEnvs:
    #   - name: HTTP_PROXY
    #     value: http://proxy.internal:3128
    # extraEnvsFrom:
    #   - configMapRef: {name: agent-extra-config}
    # extraVolumes:
    #   - name: cache
    #     emptyDir: {}
    # extraVolumeMounts:
    #   - name: cache
    #     mountPath: /cache
    # extraInitContainers:
    #   - name: warm-cache
    #     image: busybox
    #     command: ['sh', '-c', 'echo warming']
    # extraSidecarContainers:
    #   - name: tunnel
    #     image: busybox
    #     command: ['sh', '-c', 'sleep infinity']
  memory: {pgInstances: 1, pgStorage: 10Gi, neo4jStorage: 10Gi}
  # PAT-based activation (no bot account / no Project board). botLogin == the PAT
  # owner. No `board`, so issueScan covers per-repo issues only (the Repository CRs
  # below). mergePolicy/prReactionScope/approvalLabel default.
  scm:
    provider: github
    owner: szymonrychu
    botLogin: szymonrychu
    # Trusted-login allowlists (issue #102). Both are optional and empty by
    # default (open: any author may file issues/comments; the maintainer set is
    # the issue #56 autoapprove tier). When set:
    #   maintainerLogins - the unified maintainer/approver set; only these
    #     accounts' comments count as the human approval go-ahead.
    #   reporterLogins - the operator only acts on issues/issue-comments from the
    #     bot, a maintainer, or a listed reporter; everything else is dropped at
    #     intake, closing the prompt-injection vector. Both are overridable
    #     per-Repository (RepositorySpec.maintainerLogins / reporterLogins).
    # maintainerLogins: [szymonrychu]
    # reporterLogins: [szymonrychu]
    priorityLabel: tatara/priority
    cron:
      issueScan:
        schedule: "0 * * * *"
        maxPerCycle: 1
      brainstorm:
        enabled: true
        schedule: "0 6 * * *"
        maxPerCycle: 1
        sources: [docs, memory, internet]
---
apiVersion: tatara.dev/v1alpha1
kind: Repository
metadata: {name: tatara-memory, namespace: tatara}
spec: {projectRef: tatara, url: "https://github.com/szymonrychu/tatara-memory", defaultBranch: main, semanticIngest: true, reingestSchedule: "0 6 * * *"}
---
apiVersion: tatara.dev/v1alpha1
kind: Repository
metadata: {name: tatara-cli, namespace: tatara}
spec: {projectRef: tatara, url: "https://github.com/szymonrychu/tatara-cli", defaultBranch: main, semanticIngest: true, reingestSchedule: "0 6 * * *"}
---
apiVersion: tatara.dev/v1alpha1
kind: Repository
metadata: {name: tatara-operator, namespace: tatara}
spec: {projectRef: tatara, url: "https://github.com/szymonrychu/tatara-operator", defaultBranch: main, semanticIngest: true, reingestSchedule: "0 6 * * *"}
---
apiVersion: tatara.dev/v1alpha1
kind: Repository
metadata: {name: tatara-chat, namespace: tatara}
spec: {projectRef: tatara, url: "https://github.com/szymonrychu/tatara-chat", defaultBranch: main, semanticIngest: true, reingestSchedule: "0 6 * * *"}
---
apiVersion: tatara.dev/v1alpha1
kind: Repository
metadata: {name: tatara-memory-repo-ingester, namespace: tatara}
spec: {projectRef: tatara, url: "https://github.com/szymonrychu/tatara-memory-repo-ingester", defaultBranch: main, semanticIngest: true, reingestSchedule: "0 6 * * *"}
---
apiVersion: tatara.dev/v1alpha1
kind: Repository
metadata: {name: tatara-claude-code-wrapper, namespace: tatara}
spec: {projectRef: tatara, url: "https://github.com/szymonrychu/tatara-claude-code-wrapper", defaultBranch: main, semanticIngest: true, reingestSchedule: "0 6 * * *"}

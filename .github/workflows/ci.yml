name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    uses: ./.github/workflows/ci-shared.yml
    with:
      runner-label: tatara-operator
      # tatara-operator has no smoke binary; it ships two charts (looped over).
      has-chart: true
    secrets: inherit

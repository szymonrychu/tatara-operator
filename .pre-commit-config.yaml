repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: ^charts/
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-c=.yamllint.yaml]
        exclude: ^charts/

  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
      - id: golangci-lint

  - repo: local
    hooks:
      - id: golangci-lint-config-verify
        name: golangci-lint config verify
        entry: golangci-lint config verify
        language: system
        files: ^\.golangci\.yml$
        pass_filenames: false
      - id: go-test
        name: go test (mise)
        entry: mise run test
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
      - id: rbac-drift
        name: rbac drift guard
        entry: make rbac-check
        language: system
        pass_filenames: false
        files: '(internal/controller/.*\.go|charts/tatara-operator/templates/rbac\.yaml)$'

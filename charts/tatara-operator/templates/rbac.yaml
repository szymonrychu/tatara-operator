{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "tatara-operator.fullname" . }}-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tatara-operator.labels" . | nindent 4 }}
rules:
  # CRDs reconciled by the manager (full CRUD on CRs + status subresource).
  - apiGroups: ["tatara.dev"]
    resources: ["projects", "repositories", "tasks", "queuedevents", "issues", "mergerequests"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["tatara.dev"]
    resources: ["projects/status", "repositories/status", "tasks/status", "queuedevents/status", "issues/status", "mergerequests/status"]
    verbs: ["get", "update", "patch"]
  # tasks/finalizers update: the operator sets blockOwnerDeletion:true on every
  # Task ownerRef of an Issue/MergeRequest (contract B.2 rule 2). A custom
  # controller does not get blockOwnerDeletion for free - the API server checks
  # update on the OWNER's finalizers subresource before it admits a dependent
  # that asks for it. Without this rule every Issue/MR write is a 403.
  - apiGroups: ["tatara.dev"]
    resources: ["tasks/finalizers"]
    verbs: ["update"]
  # ingest Jobs (batch).
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # agent Pods + Services (M4); ingest-result ConfigMaps (M1); events.
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Per-Project memory provisioning (N4): cnpg Cluster, apps/deployments+statefulsets, PVCs.
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters/status"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Per-Project memory monitoring (issue #200): the operator server-side-applies
  # a ServiceMonitor + PrometheusRule per provisioned memory stack so the stack
  # is scraped and its alerts load, and a PodMonitor for the CNPG postgres cluster
  # (mem-<project>-pg) so the postgres instance metrics are scraped. Gated by
  # memoryMonitoring.enabled; the verbs are harmless on a cluster without the
  # prometheus-operator CRDs (no objects are applied when disabled).
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["servicemonitors", "prometheusrules", "podmonitors"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Per-project Ingress (external exposure of the memory path).
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Project SCM Secrets (read: token + webhookSecret) + per-Project generated
  # memory Secrets (create/update: neo4j password, memory config Secret).
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # The controllers record Events through the events.k8s.io/v1 sink
  # (mgr.GetEventRecorder -> k8s.io/client-go/tools/events), so the SA needs
  # events in the events.k8s.io group too; a core-group-only grant 403-drops
  # every Event (issue #384). The core "" grant above stays for any
  # legacy-recorder emitters (e.g. leader election).
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["create", "patch"]
  # Leader-election lease: a single manager acquires this Lease so that during a
  # rolling-update surge only the elected pod reconciles (avoids duplicate PRs,
  # comments, agent pods). Lease lives in the operator namespace.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "tatara-operator.fullname" . }}-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tatara-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "tatara-operator.fullname" . }}-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "tatara-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
# Cluster-scoped ClusterRole: read CRD resources (cluster-scoped by definition).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "tatara-operator.fullname" . }}-crd-reader
  labels:
    {{- include "tatara-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "tatara-operator.fullname" . }}-crd-reader
  labels:
    {{- include "tatara-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "tatara-operator.fullname" . }}-crd-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "tatara-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}

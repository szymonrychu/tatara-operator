apiVersion: v1
kind: Service
metadata:
  name: {{ include "tatara-operator.fullname" . }}
  labels:
    {{- include "tatara-operator.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "tatara-operator.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: metrics
      port: 9090
      targetPort: metrics

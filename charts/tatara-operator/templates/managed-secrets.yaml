{{- if and .Values.anthropicOauthToken .Values.anthropicSecretName }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.anthropicSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tatara-operator.labels" . | nindent 4 }}
type: Opaque
data:
  oauth-token: {{ .Values.anthropicOauthToken | b64enc | quote }}
{{- end }}
{{- if and .Values.cliOidcClientId .Values.cliOidcClientSecret .Values.cliOidcSecretName }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.cliOidcSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tatara-operator.labels" . | nindent 4 }}
type: Opaque
data:
  client-id: {{ .Values.cliOidcClientId | b64enc | quote }}
  client-secret: {{ .Values.cliOidcClientSecret | b64enc | quote }}
{{- end }}
{{- if and .Values.openaiApiKey .Values.openaiSecretName }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.openaiSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tatara-operator.labels" . | nindent 4 }}
type: Opaque
data:
  LLM_BINDING_API_KEY: {{ .Values.openaiApiKey | b64enc | quote }}
{{- end }}
{{- if and .Values.scmToken .Values.scmWebhookSecret .Values.scmSecretName }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.scmSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tatara-operator.labels" . | nindent 4 }}
type: Opaque
data:
  token: {{ .Values.scmToken | b64enc | quote }}
  webhookSecret: {{ .Values.scmWebhookSecret | b64enc | quote }}
{{- end }}

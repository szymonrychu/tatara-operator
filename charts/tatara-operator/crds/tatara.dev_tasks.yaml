---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: tasks.tatara.dev
spec:
  group: tatara.dev
  names:
    kind: Task
    listKind: TaskList
    plural: tasks
    singular: task
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.turnsCompleted
      name: Turns
      type: integer
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Task is one agent session driving a Repository toward a goal.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: TaskSpec defines the desired state of a Task.
            properties:
              approvalRequired:
                type: boolean
              goal:
                type: string
              kind:
                default: implement
                enum:
                - implement
                - review
                - selfImprove
                - triageIssue
                - brainstorm
                - issueLifecycle
                type: string
              maxTurns:
                type: integer
              projectRef:
                type: string
              proposedIssue:
                description: ProposedIssueSpec is a tatara-proposed issue awaiting
                  human approval.
                properties:
                  body:
                    type: string
                  kind:
                    enum:
                    - bug
                    - improvement
                    type: string
                  repositoryRef:
                    type: string
                  title:
                    type: string
                required:
                - body
                - kind
                - repositoryRef
                - title
                type: object
              repositoryRef:
                type: string
              source:
                description: TaskSource records the SCM work-item that originated
                  a webhook-born Task.
                properties:
                  authorLogin:
                    type: string
                  isPR:
                    type: boolean
                  issueRef:
                    type: string
                  number:
                    type: integer
                  provider:
                    enum:
                    - github
                    - gitlab
                    type: string
                  url:
                    type: string
                required:
                - issueRef
                - provider
                type: object
            required:
            - goal
            - projectRef
            - repositoryRef
            type: object
          status:
            description: TaskStatus defines the observed state of a Task.
            properties:
              changeSummary:
                description: |-
                  ChangeSummary holds the scope report submitted by the agent at the end of an
                  Implement run via the change_summary MCP tool.
                properties:
                  deliveredScope:
                    type: string
                  prBody:
                    type: string
                  prTitle:
                    type: string
                  remainingScope:
                    type: string
                type: object
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              cumulativeTokens:
                format: int64
                type: integer
              deadlineAt:
                format: date-time
                type: string
              discoveredIssues:
                items:
                  type: string
                type: array
              followupIssueURL:
                description: |-
                  FollowupIssueURL is the URL of the follow-up issue opened when
                  ChangeSummary.RemainingScope is non-empty. Used as an idempotency guard to
                  prevent opening a second follow-up issue on re-entry.
                type: string
              gateEnteredAt:
                format: date-time
                type: string
              handover:
                type: string
              headBranch:
                type: string
              implementContext:
                description: |-
                  ImplementContext is an optional re-entry prompt injected at the start of
                  the next Implement agent turn (e.g. CI failure details, conflict notice).
                  Cleared after the turn is submitted so a later fresh entry is clean.
                type: string
              issueOutcome:
                description: IssueOutcome is the agent's outcome for an issue-triage
                  task.
                properties:
                  action:
                    enum:
                    - implement
                    - close
                    - discuss
                    type: string
                  comment:
                    type: string
                required:
                - action
                type: object
              lastActivityAt:
                format: date-time
                type: string
              lastTurnInputTokens:
                format: int64
                type: integer
              lifecycleIterations:
                type: integer
              lifecycleState:
                enum:
                - Triage
                - Conversation
                - Implement
                - MRCI
                - Merge
                - MainCI
                - Done
                - Stopped
                - Parked
                type: string
              mergeCommitSHA:
                type: string
              pendingComments:
                description: |-
                  PendingComments are free-form comments queued by the agent via the
                  comment MCP tool, posted to the task's linked issue on the next
                  reconcile and then cleared. Does not change the lifecycle state.
                items:
                  type: string
                type: array
              pendingInterjections:
                description: |-
                  PendingInterjections are comment bodies queued by the webhook when a new
                  issue/MR comment arrives while an agent turn is in flight. The reconciler
                  delivers each to the live wrapper session (as mid-session user input) and
                  then clears them. Does not change the lifecycle state.
                items:
                  type: string
                type: array
              phase:
                enum:
                - Pending
                - AwaitingApproval
                - Planning
                - Running
                - Succeeded
                - Failed
                type: string
              podName:
                type: string
              prNumber:
                type: integer
              prOutcome:
                description: PROutcome is the agent's outcome for a tatara-authored
                  PR/MR.
                properties:
                  action:
                    enum:
                    - merge
                    - close
                    type: string
                  reason:
                    type: string
                required:
                - action
                type: object
              prURL:
                type: string
              resultSummary:
                type: string
              reviewVerdict:
                description: ReviewVerdict is the agent's review decision for a human-authored
                  PR/MR.
                properties:
                  body:
                    type: string
                  decision:
                    enum:
                    - approve
                    - request_changes
                    - comment
                    type: string
                  suggestions:
                    items:
                      description: Suggestion is one inline code suggestion on a PR/MR.
                      properties:
                        body:
                          type: string
                        line:
                          type: integer
                        path:
                          type: string
                      required:
                      - body
                      - line
                      - path
                      type: object
                    type: array
                required:
                - decision
                type: object
              turnsCompleted:
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}

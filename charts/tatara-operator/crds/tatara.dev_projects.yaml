---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: projects.tatara.dev
spec:
  group: tatara.dev
  names:
    kind: Project
    listKind: ProjectList
    plural: projects
    singular: project
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.webhookURL
      name: Webhook
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Project is the top-level grouping for repositories and tasks.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ProjectSpec defines the desired state of a Project.
            properties:
              agent:
                description: AgentSpec configures the wrapper agent session a Task
                  runs.
                properties:
                  contextWindowTokens:
                    default: 200000
                    type: integer
                  handoverThresholdPercent:
                    default: 50
                    type: integer
                  image:
                    type: string
                  maxLifecycleIterations:
                    default: 10
                    minimum: 3
                    type: integer
                  maxTurnsPerTask:
                    default: 50
                    type: integer
                  model:
                    type: string
                  permissionMode:
                    default: bypassPermissions
                    type: string
                  turnTimeoutSeconds:
                    default: 1800
                    description: |-
                      TurnTimeoutSeconds is the per-turn stall (inactivity) window in seconds: a
                      turn is failed only after this long with no agent activity, not at a fixed
                      wall-clock age, so a turn that keeps streaming output is not killed mid-work.
                      The name is kept for CRD compatibility.
                    type: integer
                type: object
              grafana:
                description: |-
                  GrafanaSpec configures the optional per-project Grafana incident-response
                  feature: an operator-provisioned read-only grafana-mcp and an alert-webhook
                  receiver. The feature is inert unless Enabled.
                properties:
                  cooldownSeconds:
                    default: 3600
                    description: CooldownSeconds is the per-alert-group refire window
                      (default 3600).
                    type: integer
                  enabled:
                    type: boolean
                  secretRef:
                    description: |-
                      SecretRef names a Secret holding the Grafana credentials. Keys:
                        serviceAccountToken - Grafana Viewer SA token (mounted into grafana-mcp)
                        webhookSecret       - static bearer the alert webhook must present
                    type: string
                  url:
                    description: URL is the Grafana base URL grafana-mcp queries (non-secret).
                    type: string
                required:
                - enabled
                type: object
              maxConcurrentTasks:
                default: 3
                type: integer
              maxOpenTasks:
                default: 3
                description: |-
                  MaxOpenTasks is the hard ceiling on non-terminal Tasks the operator will
                  autonomously create for this Project (cron scans + brainstorm). At the cap,
                  scan/brainstorm creation is skipped until open Tasks finish. The reactive
                  webhook path is exempt (human-initiated).
                type: integer
              memory:
                description: |-
                  MemorySpec configures the per-Project memory stack footprint. Defaults are
                  declared via +kubebuilder:default so they are enforced at admission and
                  visible in the persisted object; the internal/memory builders no longer need
                  to carry fallback constants.
                properties:
                  neo4jStorage:
                    default: 10Gi
                    type: string
                  pgInstances:
                    default: 1
                    type: integer
                  pgStorage:
                    default: 10Gi
                    type: string
                type: object
              queue:
                description: QueueSpec configures the in-operator agent-work admission
                  queue.
                properties:
                  alertCapacity:
                    description: 'AlertCapacity M: reserved concurrent slots for alert-class
                      events (default 1).'
                    type: integer
                  capacity:
                    description: |-
                      Capacity N: max concurrently-admitted normal-class events (defaults to
                      MaxConcurrentTasks, else 3).
                    type: integer
                  queuedAutonomousCap:
                    description: |-
                      QueuedAutonomousCap K: max Queued autonomous (cron) events; crons stop
                      enqueuing past it (defaults to MaxOpenTasks, else 3). Webhooks/alerts exempt.
                    type: integer
                type: object
              scm:
                description: ScmSpec binds a Project to one SCM provider and its board/merge
                  policy.
                properties:
                  approvalLabel:
                    default: tatara/awaiting-approval
                    description: |-
                      ApprovalLabel is DEPRECATED and no longer used: approval is now driven by
                      the conversation (the triage agent reads the thread) and projected onto the
                      idea/approved/rejected labels below. Kept only for migration tooling.
                    type: string
                  approvedLabel:
                    default: tatara-approved
                    description: ApprovedLabel marks an issue approved for implementation.
                    type: string
                  babysitDeadlineMinutes:
                    default: 60
                    type: integer
                  board:
                    description: BoardSpec configures the project board tatara participates
                      in.
                    properties:
                      githubProjectNumber:
                        type: integer
                      gitlabBoardId:
                        type: integer
                      statusField:
                        default: Status
                        type: string
                    type: object
                  botLogin:
                    type: string
                  brainstormingLabel:
                    default: tatara-brainstorming
                    description: BrainstormingLabel marks an issue tatara is triaging
                      / discussing (pre-approval).
                    type: string
                  conversationIdleMinutes:
                    default: 60
                    type: integer
                  cron:
                    description: ScmCron groups the cron-driven scan activities.
                    properties:
                      brainstorm:
                        description: BrainstormActivity schedules the opt-in self-driven
                          issue-proposal scan.
                        properties:
                          enabled:
                            type: boolean
                          maxOpenProposals:
                            default: 5
                            description: |-
                              MaxOpenProposals caps the total open, unapproved agent proposals across
                              ALL repos in the project; at or above this the brainstorm cycle is
                              skipped. Default 5.
                            type: integer
                          maxPerCycle:
                            default: 1
                            description: |-
                              Deprecated: MaxPerCycle is retained for API compatibility only. The controller
                              hard-caps brainstorm at one Task per project per cycle regardless of this value.
                              Setting it has no effect. See MEMORY.md for rationale.
                            type: integer
                          schedule:
                            pattern: ^$|^(\S+\s+){4}\S+$
                            type: string
                          sources:
                            items:
                              enum:
                              - docs
                              - memory
                              - internet
                              type: string
                            type: array
                        type: object
                      healthCheck:
                        description: |-
                          HealthCheckActivity schedules the opt-in periodic project-health-check scan:
                          a sibling to brainstorm that surveys repo health (CI failures, coverage gaps,
                          code to simplify, pipeline steps to add, other tech-debt) and proposes one
                          targeted discovery issue per cycle via the tatara-health-check skill.
                        properties:
                          enabled:
                            type: boolean
                          maxOpenProposals:
                            default: 5
                            description: |-
                              MaxOpenProposals caps the total open, unapproved agent proposals across
                              ALL repos in the project; at or above this the health-check cycle is
                              skipped. Default 5.
                            type: integer
                          schedule:
                            pattern: ^$|^(\S+\s+){4}\S+$
                            type: string
                          sources:
                            items:
                              enum:
                              - docs
                              - memory
                              - internet
                              type: string
                            type: array
                        type: object
                      issueScan:
                        description: CronActivity schedules one Project scan activity
                          (mrScan or issueScan).
                        properties:
                          maxPerRepo:
                            default: 1
                            description: MaxPerRepo caps the number of in-progress
                              Tasks per repo (one lane per repo).
                            minimum: 1
                            type: integer
                          schedule:
                            description: Schedule is a 5-field cron (robfig ParseStandard).
                              Empty disables this activity.
                            pattern: ^$|^(\S+\s+){4}\S+$
                            type: string
                        type: object
                      mrScan:
                        description: CronActivity schedules one Project scan activity
                          (mrScan or issueScan).
                        properties:
                          maxPerRepo:
                            default: 1
                            description: MaxPerRepo caps the number of in-progress
                              Tasks per repo (one lane per repo).
                            minimum: 1
                            type: integer
                          schedule:
                            description: Schedule is a 5-field cron (robfig ParseStandard).
                              Empty disables this activity.
                            pattern: ^$|^(\S+\s+){4}\S+$
                            type: string
                        type: object
                    type: object
                  declinedLabel:
                    default: tatara-declined
                    description: DeclinedLabel marks an issue declined before implementation
                      (triage reject).
                    type: string
                  ideaLabel:
                    default: tatara-idea
                    description: IdeaLabel is DEPRECATED (legacy alias for BrainstormingLabel);
                      kept for lazy migration.
                    type: string
                  implementationLabel:
                    default: tatara-implementation
                    description: ImplementationLabel marks an issue whose implementation
                      is in flight.
                    type: string
                  maintainerLogins:
                    description: |-
                      MaintainerLogins are the human maintainer accounts. Together with BotLogin
                      they form the "trusted insider" set: issues opened by anyone OUTSIDE this
                      set (third-party contributors) are autoapproved through triage without the
                      self-approve hold. Empty means only BotLogin is excluded from autoapprove.
                    items:
                      type: string
                    type: array
                  mergePolicy:
                    default: afterApproval
                    enum:
                    - afterApproval
                    - autoMergeOnGreenCI
                    type: string
                  owner:
                    type: string
                  prReactionScope:
                    default: labeledOrMentioned
                    enum:
                    - labeledOrMentioned
                    - all
                    type: string
                  priorityLabel:
                    type: string
                  provider:
                    enum:
                    - github
                    - gitlab
                    type: string
                  rejectedLabel:
                    default: tatara-rejected
                    description: RejectedLabel is DEPRECATED (legacy alias for DeclinedLabel);
                      kept for lazy migration.
                    type: string
                required:
                - botLogin
                - owner
                - provider
                type: object
              scmSecretRef:
                type: string
              triggerLabel:
                default: tatara
                type: string
            required:
            - scmSecretRef
            type: object
          status:
            description: ProjectStatus defines the observed state of a Project.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              grafana:
                description: GrafanaStatus reports the observed state of the per-Project
                  grafana-mcp.
                properties:
                  endpoint:
                    type: string
                  phase:
                    type: string
                type: object
              lastBrainstorm:
                format: date-time
                type: string
              lastHealthCheck:
                format: date-time
                type: string
              lastIssueScan:
                format: date-time
                type: string
              lastMRScan:
                format: date-time
                type: string
              memory:
                description: |-
                  MemoryStatus reports the observed state of the per-Project memory stack.
                  Endpoint is the canonical in-cluster URL every other component reads.
                properties:
                  endpoint:
                    type: string
                  externalEndpoint:
                    type: string
                  phase:
                    type: string
                type: object
              webhookURL:
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}

# Image. tag defaults to chart appVersion when empty.
image:
  repository: harbor.szymonrichert.pl/containers/tatara-operator
  tag: ""
  pullPolicy: IfNotPresent

# imagePullSecrets are cluster-specific; the deploying helmfile supplies them.
imagePullSecrets: []

replicaCount: 1

# Listener/config scalars. Each maps 1:1 to a SCREAMING_SNAKE ConfigMap key
# via the envConfig helper and is consumed by the manager through envFrom (rule 6).
httpAddr: ":8080"
metricsAddr: ":9090"
healthAddr: ":8081"
internalAddr: ":8082"
# callbackUrl: full routable in-cluster base URL wrapper pods POST to.
# M6 sets this to the internal Service DNS, e.g. http://tatara-operator-internal.tatara.svc:8082
callbackUrl: ""
oidcIssuer: ""
oidcAudience: "tatara-operator"
# Per-Project memory stack images + shared OpenAI secret (rule 6: scalar ->
# SCREAMING_SNAKE ConfigMap key -> manager via envFrom). MEMORY_BASE_URL was
# removed in N3 (replaced by per-Project status.memory.endpoint).
memoryImage: ""
lightragImage: ""
neo4jImage: ""
openaiSecretName: ""
ingesterImage: ""
# grafana-mcp image for the optional per-project Grafana incident-response feature.
grafanaMcpImage: ""
# memoryMonitoring controls the ServiceMonitor + PrometheusRule the operator
# emits per provisioned memory stack (issue #200). Consumed by the operator at
# runtime (it provisions native objects per Project), not chart-rendered, so the
# values flow via the ConfigMap: enabled -> MEMORY_MONITORING_ENABLED scalar;
# additionalLabels -> MEMORY_MONITOR_LABELS as a JSON object (rule 6, same as
# agentScheduling). enabled gates emission so a cluster without the
# prometheus-operator CRDs is not handed an unknown kind. additionalLabels is
# the cluster-specific knob: the deploying helmfile sets whatever label the
# cluster Prometheus serviceMonitorSelector / ruleSelector matches on (e.g.
# release: prometheus); the chart bakes none (rule 14).
memoryMonitoring:
  enabled: true
  additionalLabels: {}
externalWebhookBase: ""
operatorOidcClientId: "tatara-operator"
# operatorOidcSecretName overrides the Secret that holds OPERATOR_OIDC_CLIENT_SECRET.
# Defaults to the release fullname (the Secret rendered by secret.yaml). Set when
# using an externally-managed Secret that differs from existingSecret.
operatorOidcSecretName: ""
anthropicSecretName: ""
cliOidcSecretName: ""
# Name of the Secret holding the callback HMAC shared secret (key
# callback-hmac-secret). When set, the operator verifies HMAC-SHA256 signatures
# on /internal/turn-complete and wrapper Pods sign their callbacks. Empty = HMAC
# disabled (NetworkPolicy remains the sole control). Delivered to wrapper Pods
# via SecretKeyRef, never a plaintext Pod-spec env value.
callbackHmacSecretName: ""
# imagePullSecret is cluster-specific (rule 14); set via infra helmfile values.
# When non-empty, it is injected into every operator-spawned workload (neo4j
# StatefulSet, lightrag Deployment, tatara-memory Deployment, cnpg Cluster).
imagePullSecret: ""
namespace: "tatara"
logLevel: "info"
ingressHost: ""
# ingressClassName / ingressRewriteTarget drive the operator-managed per-Project
# memory Ingress. Both default empty so the chart is cluster-agnostic (rule 14):
# empty class lets the cluster default IngressClass apply; empty rewrite-target
# omits the nginx-specific annotation. The deploying helmfile sets them (e.g.
# "nginx" / "/$2") for its ingress controller.
ingressClassName: ""
ingressRewriteTarget: ""
memoryPathPrefix: "/api/v1/memory"
# Leader election guards against two managers reconciling concurrently during a
# rolling-update surge (replicaCount: 1, maxSurge rounds up to 1). Keep on; set
# false only for single-process local/envtest runs.
leaderElection: true

# idlePodReapMinutes bounds how long an agent pod may sit with no live turn before
# the reaper deletes it as a leaked wrapper (issue #237). When a turn times out or
# completes the wrapper parks idle in epoll waiting for the next PTY input; if the
# operator never submits a next turn or tears it down the pod holds a Task slot +
# node resources for hours. Default 30m comfortably exceeds any healthy
# between-turn gap; the context bundle IS the continuation state, so a still-live
# Task re-spawns a fresh pod and resumes - reaping is safe. The operator clamps a
# positive value up to a 5m floor; set 0 to disable the idle backstop.
idlePodReapMinutes: 30

# pushMetricsAllowedPrefixes is the comma-separated metric-name prefix allowlist
# the push-receiver enforces on short-lived-pod metric pushes. Series whose name
# matches no prefix are dropped (operator_push_series_dropped_total{reason=
# "reserved_name"}, alerted by TataraPushMetricsDropped). These are the REAL
# names the ephemeral producers push: the wrapper pods emit ccw_* and
# tatara_wrapper_* (issue #129); the repo ingester emits ingest_* plus
# analyzer_*/semantic_*/scip_*/llm_*. wrapper_/agent_ are kept as reserved
# prefixes for future agent series. memory_ is intentionally absent: the memory
# service is scraped, not pushed (it emits lightrag_*/code_graph_*/
# tatara_memory_*), so memory_ matched nothing. Keep this in sync as new pushed
# families appear; TataraPushMetricsDropped fires if a prefix is missed.
pushMetricsAllowedPrefixes: "wrapper_,agent_,ccw_,tatara_wrapper_,ingest_,analyzer_,semantic_,scip_,llm_"

# Incident dedup + refire (issue #320/#328). Empty volatile-labels CSV => the
# operator's built-in default (pod,reason,instance,container,endpoint,uid,id,replica,ordinal).
incidentDedupVolatileLabels: ""
incidentRefireCommentCooldownMinutes: 30

# Token-budget admission gate (issue #189): pause proactive work (brainstorm,
# implement, review) at tokenBudgetProactivePercent and incident work at
# tokenBudgetEmergencyPercent of the per-window usage, resuming when the window
# resets. These are the fleet-wide DEFAULTS; a Project's spec.tokenBudget
# overrides them per project. OFF until tokenBudgetEnabled is true, so the gate
# is inert and backwards-compatible by default. Cluster-agnostic (rule 14): the
# schedule/limit are empty here and supplied per-environment by the helmfile.
# tokenBudgetMode: "customWindow" meters the operator's own per-turn token
# accounting against tokenBudgetTokenLimit within a cron-anchored reset window
# (set tokenBudgetResetSchedule + tokenBudgetWindow); "claudeSubscription" gates
# on the wrapper-reported Claude 5h/weekly usage percentages instead.
tokenBudgetEnabled: false
tokenBudgetMode: "customWindow"
tokenBudgetProactivePercent: 50
tokenBudgetEmergencyPercent: 80
# tokenBudgetResetSchedule is a 5-field cron marking each window reset boundary;
# tokenBudgetWindow is the declared window length as a Go duration (e.g. "5h",
# "168h") and bounds the reset search. Both are customWindow-mode inputs.
tokenBudgetResetSchedule: ""
tokenBudgetWindow: ""
# tokenBudgetTokenLimit is the absolute total-token budget per window
# (customWindow mode); 0 leaves the custom window inert.
tokenBudgetTokenLimit: 0

# Claude account-usage poller (claudeSubscription gate). The operator polls the
# undocumented /api/oauth/usage to feed the per-kind spawnCeilingByKind gate. OFF
# until usageEnabled is true, so the chart is inert + backwards-compatible by
# default (cluster-agnostic, rule 14: usageSecretName/usageBaseUrl empty here,
# supplied per-environment by the helmfile). The endpoint needs the user:profile
# OAuth scope the shared fleet setup-token lacks, so set usageSecretName to a
# Secret holding oauth-access-token/oauth-refresh-token/oauth-expires-at (an
# interactive-login token bundle); the operator self-refreshes + persists it.
# usageOauthClientId/usageTokenUrl are the (reverse-engineered) Claude Code OAuth
# client id + refresh endpoint, kept configurable so a provider change is a value
# flip, not a code change. When usageSecretName is empty the poller falls back to
# the static oauth-token key of anthropicSecretName (only works with a
# user:profile token). Poll floor is 180s (enforced operator-side too).
usageEnabled: false
usageAuthMode: "bearer"
usagePollInterval: "180s"
usageUserAgent: "claude-code/1.0.0"
usageBaseUrl: ""
usageSecretName: ""
usageOauthClientId: "9d1c250a-e61b-44d9-88ed-5944d1962f5e" # gitleaks:allow public Claude Code OAuth client id
usageTokenUrl: "https://platform.claude.com/v1/oauth/token"
usageRefreshMargin: "5m"

# Agent wrapper Pod resource requests/limits + securityContext (rule 6: camelCase
# scalar -> SCREAMING_SNAKE ConfigMap key -> manager via envFrom). These bound the
# otherwise-unbounded agent pods. Resources/runAsNonRoot are chart-appropriate
# defaults; runAsUser/fsGroup are left empty so the helmfile can pin them per
# cluster (cluster-agnostic, rule 14). Empty resource scalar = no constraint.
agentCpuRequest: "250m"
agentCpuLimit: "2"
agentMemoryRequest: "512Mi"
agentMemoryLimit: "4Gi"
# Default false (cluster-agnostic, rule 14): the chart cannot know the agent image's
# numeric uid, and runAsNonRoot:true without a numeric runAsUser hard-fails any
# non-numeric-USER image (CreateContainerConfigError). The deploying helmfile opts
# into non-root by setting BOTH agentRunAsNonRoot:true AND a numeric agentRunAsUser.
agentRunAsNonRoot: false
# When agentRunAsNonRoot is true this MUST be the image's numeric uid; the chart
# fail-renders otherwise (see _helpers.tpl). The wrapper image is uid 10001.
agentRunAsUser: ""
agentFsGroup: ""

# agentScheduling is the cluster-specific Pod placement for spawned agent pods
# (nodeSelector / tolerations / affinity). Rule 6 list-shaped data: rendered into
# the operator ConfigMap as a single JSON document key (AGENT_SCHEDULING) and
# parsed at runtime. EMPTY by default so the chart stays cluster-agnostic (rule
# 14); the deploying helmfile supplies the real placement, e.g.
#   agentScheduling:
#     nodeSelector: {kubernetes.io/os: linux}
#     tolerations: [{key: dedicated, operator: Exists, effect: NoSchedule}]
#     affinity: {}
agentScheduling: {}

# Secret-backed scalars. Provided by a SOPS-encrypted values overlay at deploy
# time. Set existingSecret to use an externally-managed Secret instead.
existingSecret: ""
operatorOidcClientSecret: ""

# Cluster-managed secrets rendered from SOPS values (empty = not rendered, use
# an externally-managed Secret of the same name instead). Data keys are fixed
# by consumer code; do not rename.
scmSecretName: ""
anthropicOauthToken: ""
cliOidcClientId: ""
cliOidcClientSecret: ""
openaiApiKey: ""
scmToken: ""
scmWebhookSecret: ""
# Callback HMAC shared secret value. Rendered into the Secret named by
# callbackHmacSecretName under key callback-hmac-secret when both are set.
callbackHmacSecret: ""

service:
  type: ClusterIP
  httpPort: 8080
  metricsPort: 9090

serviceMonitor:
  enabled: true
  interval: "30s"
  scrapeTimeout: "10s"

# prometheusRule ships a PrometheusRule of loop-failure alerts over the
# operator's own operator_*/tatara_* series (same CRD family and deploy pattern
# as serviceMonitor). additionalLabels is the only cluster-specific knob: the
# infra helmfile sets whatever label the cluster Prometheus ruleSelector matches
# on (the chart bakes none, per the cluster-agnostic rule). severityLabel is
# stamped on every alert; tasksInflightThreshold tunes the concurrency-cap
# deadman threshold; turnSubmitP95LatencyThreshold (seconds) tunes the SubmitTurn
# p95 latency alert (the operator_turn_submit_duration_seconds histogram tops out
# at 25.6s, so keep this well under that ceiling). ingestStaleAfterSeconds is the
# TataraIngestStale budget: how long since a repo's last successful ingest before
# its recall corpus is considered stale (default 93600s = 26h, comfortably over
# the daily reingest cron). sweepStaleAfterSeconds is the TataraSweepStalled
# budget: the B.4 sweep is the ONLY intake since the task-centric redesign (the
# webhook mints nothing), and its heartbeat gauge is stamped only on a pass with
# zero errors, so this must comfortably exceed the project's issueScan schedule
# (default 10800s = 3h against an hourly scan). criticalSeverityLabel is stamped
# on the alerts that are not "look at this soon" but "an unreviewed change may be
# on main" - today, TataraUnexpectedMerge (accepted risk D-A: the merge gate is
# operator logic, not a forge-enforced control, so detection is the control).
# Alertmanager routing stays cluster-side.
prometheusRule:
  enabled: true
  severityLabel: "warning"
  criticalSeverityLabel: "critical"
  tasksInflightThreshold: 8
  turnSubmitP95LatencyThreshold: 5
  ingestStaleAfterSeconds: 93600
  sweepStaleAfterSeconds: 10800
  additionalLabels: {}

# dashboard ships the "Tatara Loop" Grafana dashboard as a ConfigMap labelled
# grafana_dashboard: "1" so the Grafana sidecar auto-discovers it (same
# ship-with-the-operator pattern as serviceMonitor). The chart hardcodes no
# datasource UID - the dashboard exposes a datasource template variable, so the
# cluster's default/selected Prometheus is used. additionalLabels lets the infra
# helmfile match a non-default sidecar label; folder selects the Grafana folder.
dashboard:
  enabled: true
  folder: "tatara"
  additionalLabels: {}

# The operator's own ingress. className is EMPTY by default (cluster-agnostic,
# rule 14): an empty ingressClassName lets the cluster's default IngressClass
# apply, and the deploying helmfile sets the real class. Same for host.
ingress:
  enabled: false
  className: ""
  host: ""
  path: "/"
  clusterIssuer: letsencrypt-prod
  tlsSecretName: ""

# managedPodNetworkPolicy: egress-allowlist applied to spawned agent + ingest pods
# (selected by tatara.dev/managed-by=tatara-operator).
managedPodNetworkPolicy:
  enabled: true

rbac:
  create: true

serviceAccount:
  create: true
  annotations: {}
  name: ""

ingestServiceAccount:
  create: true
  name: "tatara-ingest"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  readOnlyRootFilesystem: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 256Mi

# render+upgrade the tatara.dev CRDs as templates; set false if CRDs are managed externally
installCRDs: true

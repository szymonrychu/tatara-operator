# Image. tag defaults to chart appVersion when empty.
image:
  repository: harbor.szymonrichert.pl/containers/tatara-operator
  tag: ""
  pullPolicy: IfNotPresent

# imagePullSecrets are cluster-specific; the deploying helmfile supplies them.
imagePullSecrets: []

replicaCount: 1

# Listener/config scalars. Each maps 1:1 to a SCREAMING_SNAKE ConfigMap key
# via the envConfig helper and is consumed by the manager through envFrom (rule 6).
httpAddr: ":8080"
metricsAddr: ":9090"
healthAddr: ":8081"
internalAddr: ":8082"
# callbackUrl: full routable in-cluster base URL wrapper pods POST to.
# M6 sets this to the internal Service DNS, e.g. http://tatara-operator-internal.tatara.svc:8082
callbackUrl: ""
oidcIssuer: ""
oidcAudience: "tatara-operator"
# Per-Project memory stack images + shared OpenAI secret (rule 6: scalar ->
# SCREAMING_SNAKE ConfigMap key -> manager via envFrom). MEMORY_BASE_URL was
# removed in N3 (replaced by per-Project status.memory.endpoint).
memoryImage: ""
lightragImage: ""
neo4jImage: ""
openaiSecretName: ""
ingesterImage: ""
externalWebhookBase: ""
operatorOidcClientId: "tatara-operator"
# operatorOidcSecretName overrides the Secret that holds OPERATOR_OIDC_CLIENT_SECRET.
# Defaults to the release fullname (the Secret rendered by secret.yaml). Set when
# using an externally-managed Secret that differs from existingSecret.
operatorOidcSecretName: ""
anthropicSecretName: ""
cliOidcSecretName: ""
# imagePullSecret is cluster-specific (rule 14); set via infra helmfile values.
# When non-empty, it is injected into every operator-spawned workload (neo4j
# StatefulSet, lightrag Deployment, tatara-memory Deployment, cnpg Cluster).
imagePullSecret: ""
namespace: "tatara"
logLevel: "info"
ingressHost: ""
# ingressClassName / ingressRewriteTarget drive the operator-managed per-Project
# memory Ingress. Both default empty so the chart is cluster-agnostic (rule 14):
# empty class lets the cluster default IngressClass apply; empty rewrite-target
# omits the nginx-specific annotation. The deploying helmfile sets them (e.g.
# "nginx" / "/$2") for its ingress controller.
ingressClassName: ""
ingressRewriteTarget: ""
memoryPathPrefix: "/api/v1/memory"
chatPathPrefix: "/api/v1/chat"
chatImage: ""
# Leader election guards against two managers reconciling concurrently during a
# rolling-update surge (replicaCount: 1, maxSurge rounds up to 1). Keep on; set
# false only for single-process local/envtest runs.
leaderElection: true

# Agent wrapper Pod resource requests/limits + securityContext (rule 6: camelCase
# scalar -> SCREAMING_SNAKE ConfigMap key -> manager via envFrom). These bound the
# otherwise-unbounded agent pods. Resources/runAsNonRoot are chart-appropriate
# defaults; runAsUser/fsGroup are left empty so the helmfile can pin them per
# cluster (cluster-agnostic, rule 14). Empty resource scalar = no constraint.
agentCpuRequest: "250m"
agentCpuLimit: "2"
agentMemoryRequest: "512Mi"
agentMemoryLimit: "4Gi"
# Default false (cluster-agnostic, rule 14): the chart cannot know the agent image's
# numeric uid, and runAsNonRoot:true without a numeric runAsUser hard-fails any
# non-numeric-USER image (CreateContainerConfigError). The deploying helmfile opts
# into non-root by setting BOTH agentRunAsNonRoot:true AND a numeric agentRunAsUser.
agentRunAsNonRoot: false
# When agentRunAsNonRoot is true this MUST be the image's numeric uid; the chart
# fail-renders otherwise (see _helpers.tpl). The wrapper image is uid 10001.
agentRunAsUser: ""
agentFsGroup: ""

# agentScheduling is the cluster-specific Pod placement for spawned agent pods
# (nodeSelector / tolerations / affinity). Rule 6 list-shaped data: rendered into
# the operator ConfigMap as a single JSON document key (AGENT_SCHEDULING) and
# parsed at runtime. EMPTY by default so the chart stays cluster-agnostic (rule
# 14); the deploying helmfile supplies the real placement, e.g.
#   agentScheduling:
#     nodeSelector: {kubernetes.io/os: linux}
#     tolerations: [{key: dedicated, operator: Exists, effect: NoSchedule}]
#     affinity: {}
agentScheduling: {}

# Secret-backed scalars. Provided by a SOPS-encrypted values overlay at deploy
# time. Set existingSecret to use an externally-managed Secret instead.
existingSecret: ""
operatorOidcClientSecret: ""

# Cluster-managed secrets rendered from SOPS values (empty = not rendered, use
# an externally-managed Secret of the same name instead). Data keys are fixed
# by consumer code; do not rename.
scmSecretName: ""
anthropicOauthToken: ""
cliOidcClientId: ""
cliOidcClientSecret: ""
openaiApiKey: ""
scmToken: ""
scmWebhookSecret: ""

service:
  type: ClusterIP
  httpPort: 8080
  metricsPort: 9090

serviceMonitor:
  enabled: true
  interval: "30s"
  scrapeTimeout: "10s"

ingress:
  enabled: false
  className: nginx
  host: ""
  path: "/"
  clusterIssuer: letsencrypt-prod
  tlsSecretName: ""

# managedPodNetworkPolicy: egress-allowlist applied to spawned agent + ingest pods
# (selected by tatara.dev/managed-by=tatara-operator).
managedPodNetworkPolicy:
  enabled: true
  chatServiceName: tatara-chat

rbac:
  create: true

serviceAccount:
  create: true
  annotations: {}
  name: ""

ingestServiceAccount:
  create: true
  name: "tatara-ingest"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  readOnlyRootFilesystem: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 256Mi

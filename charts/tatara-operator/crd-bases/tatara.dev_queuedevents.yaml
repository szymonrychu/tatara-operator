---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: queuedevents.tatara.dev
spec:
  group: tatara.dev
  names:
    kind: QueuedEvent
    listKind: QueuedEventList
    plural: queuedevents
    singular: queuedevent
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.seq
      name: Seq
      type: integer
    - jsonPath: .spec.class
      name: Class
      type: string
    - jsonPath: .spec.kind
      name: Kind
      type: string
    - jsonPath: .status.state
      name: State
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              autonomous:
                type: boolean
              class:
                type: string
              dedupKey:
                type: string
              kind:
                type: string
              payload:
                description: |-
                  QueuedEventPayload is the Task blueprint a producer stashes; the dispatcher
                  rebuilds the Task from it verbatim on admission. Producers keep ownership of
                  label/goal/source construction so the dispatcher stays generic.
                properties:
                  alertRule:
                    description: AlertRule is carried from the incident webhook onto
                      the built Task.
                    type: string
                  annotations:
                    additionalProperties:
                      type: string
                    type: object
                  generateName:
                    description: |-
                      GenerateName is used when Name is empty; Name is a fixed deterministic
                      Task name (issueLifecycle) that makes admission idempotent.
                    type: string
                  goal:
                    type: string
                  kind:
                    type: string
                  labels:
                    additionalProperties:
                      type: string
                    type: object
                  name:
                    type: string
                  podRepo:
                    type: string
                  provider:
                    description: Provider + PodRepo feed agent.StampPodName on the
                      rebuilt Task.
                    type: string
                  repositoryRef:
                    type: string
                  source:
                    description: TaskSource records the SCM work-item that originated
                      a webhook-born Task.
                    properties:
                      authorLogin:
                        type: string
                      dedupNumber:
                        description: |-
                          DedupNumber is the linked-issue number for bot-PR tasks. When a bot MR
                          carries "Closes #N" in its body, this field holds N so the dedup logic can
                          match the task against the issue slot (not the PR number). Zero means the
                          task targets the item identified by Number (the PR/issue number itself).
                        type: integer
                      headSHA:
                        description: |-
                          HeadSHA is the PR/MR head commit SHA captured at enqueue. It seeds the
                          review Task's role:reviewed ledger entry so same-head re-review dedup works
                          on the very next scan cycle, without waiting for the cron backstop to fill
                          it. Empty for issues.
                        type: string
                      isPR:
                        type: boolean
                      issueRef:
                        type: string
                      number:
                        type: integer
                      provider:
                        enum:
                        - github
                        - gitlab
                        type: string
                      title:
                        description: |-
                          Title is the originating issue/PR/MR title, captured at enqueue. Feeds the
                          branch slug (TaskBranch) and the no-agent PR-title fallback.
                        type: string
                      url:
                        type: string
                    required:
                    - issueRef
                    - provider
                    type: object
                  systemicGroup:
                    description: SystemicGroup describes the systemic-improvement
                      group a lead issue owns.
                    properties:
                      crossRepo:
                        items:
                          type: string
                        type: array
                      sameRepoSiblings:
                        items:
                          type: integer
                        type: array
                      systemicId:
                        type: string
                    required:
                    - systemicId
                    type: object
                required:
                - kind
                type: object
              projectRef:
                type: string
              repositoryRef:
                type: string
              seq:
                format: int64
                type: integer
            required:
            - class
            - kind
            - payload
            - projectRef
            - seq
            type: object
          status:
            properties:
              admittedAt:
                format: date-time
                type: string
              state:
                type: string
              taskRef:
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}

---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: queuedevents.tatara.dev
spec:
  group: tatara.dev
  names:
    kind: QueuedEvent
    listKind: QueuedEventList
    plural: queuedevents
    singular: queuedevent
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.seq
      name: Seq
      type: integer
    - jsonPath: .spec.class
      name: Class
      type: string
    - jsonPath: .spec.kind
      name: Kind
      type: string
    - jsonPath: .status.state
      name: State
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              autonomous:
                type: boolean
              class:
                type: string
              dedupKey:
                type: string
              kind:
                type: string
              payload:
                description: |-
                  QueuedEventPayload is the Task blueprint a producer stashes; the dispatcher
                  rebuilds the Task from it verbatim on admission. Producers keep ownership of
                  label/goal/source construction so the dispatcher stays generic.
                properties:
                  agentKind:
                    description: |-
                      AgentKind is the pod to spawn for a stage-driven admission (contract
                      B.7). It marks the ADMISSION-TICKET payload shape: when set, exactly one
                      of TaskRef / NewTask must also be set (ValidateQueuedEventSpec enforces
                      this). Kept +optional at the CRD level (unlike the contract's bare
                      literal) so a flat MINT payload (the sweep/webhook producers, which fill
                      only Kind/Goal/...) keeps validating unchanged.
                    enum:
                    - brainstorm
                    - incident
                    - clarify
                    - refine
                    - review
                    - documentation
                    - implement
                    type: string
                  alertRule:
                    description: |-
                      AlertRule is carried from the incident webhook onto the built Task's
                      Spec.AlertRules.
                    type: string
                  annotations:
                    additionalProperties:
                      type: string
                    type: object
                  dedupKey:
                    description: |-
                      DedupKey is carried from the incident webhook onto the built Task's
                      Spec.DedupKey (the incident alert-group dedup identity).
                    type: string
                  generateName:
                    description: |-
                      GenerateName is used when Name is empty; Name is a fixed deterministic
                      Task name that makes admission idempotent.
                    type: string
                  goal:
                    type: string
                  kind:
                    type: string
                  labels:
                    additionalProperties:
                      type: string
                    type: object
                  name:
                    type: string
                  newTask:
                    description: NewTask is the blueprint for a Task that does not
                      exist yet (a mint).
                    properties:
                      alertRules:
                        items:
                          type: string
                        type: array
                      annotations:
                        additionalProperties:
                          type: string
                        type: object
                      goal:
                        description: |-
                          Goal carries the SAME MaxLength=16384 cap as Task.spec.goal
                          (task_types.go) - it is NON-EVICTABLE at the far end.
                        maxLength: 16384
                        type: string
                      issueKeys:
                        items:
                          type: string
                        type: array
                      kind:
                        description: Kind is the ORIGIN kind.
                        type: string
                      labels:
                        additionalProperties:
                          type: string
                        type: object
                      name:
                        description: Name is deterministic so admission is idempotent.
                        type: string
                      projectRef:
                        type: string
                      repositoryRef:
                        type: string
                    required:
                    - goal
                    - kind
                    - name
                    - projectRef
                    type: object
                  podRepo:
                    type: string
                  provider:
                    description: Provider + PodRepo feed agent.StampPodName on the
                      rebuilt Task.
                    type: string
                  repositoryRef:
                    type: string
                  source:
                    description: |-
                      TaskSource records the SCM work-item that originated a Task. It is the SEED
                      IDENTITY the triaging stage mints the Issue CR from (F.2) and the base of the
                      deterministic task branch (agent.TaskBranch). It is NOT a dedup ledger: the
                      five dedup mechanisms folded into the (repo, number) natural key at the
                      cutover, and the sixth (the incident alert-group hash) lives on Spec.DedupKey.
                    properties:
                      authorLogin:
                        type: string
                      headSHA:
                        description: HeadSHA is the PR/MR head commit SHA captured
                          at mint. Empty for issues.
                        type: string
                      isPR:
                        type: boolean
                      issueRef:
                        type: string
                      number:
                        type: integer
                      provider:
                        enum:
                        - github
                        - gitlab
                        type: string
                      title:
                        description: |-
                          Title is the originating issue/PR/MR title, captured at mint. Feeds the
                          branch slug (TaskBranch) and the no-agent PR-title fallback.
                        type: string
                      url:
                        type: string
                    required:
                    - issueRef
                    - provider
                    type: object
                  taskRef:
                    description: |-
                      TaskRef names an EXISTING Task (a stage-driven spawn).
                      Exactly one of TaskRef / NewTask is set when AgentKind is set.
                    type: string
                required:
                - kind
                type: object
              priority:
                default: 2
                description: |-
                  Priority orders admission ahead of Seq. Lower is more urgent.
                    0 = incident              (redundant with the alert pool; kept for clarity)
                    1 = webhook-originated    (a human is waiting)
                    2 = cron/sweep-originated (proactive work)

                  It is a *int, NOT an int (fix M17): Go's zero value for an int is 0, so
                  client-go would ALWAYS serialise "priority": 0, the field would never be
                  ABSENT from the request body, the CRD default would NEVER fire, and any
                  producer that forgot the field would land in the MOST URGENT tier. A nil
                  pointer is genuinely absent, so the default applies.
                enum:
                - 0
                - 1
                - 2
                type: integer
              projectRef:
                type: string
              repositoryRef:
                type: string
              seq:
                format: int64
                type: integer
            required:
            - class
            - kind
            - payload
            - projectRef
            - seq
            type: object
          status:
            properties:
              admittedAt:
                format: date-time
                type: string
              state:
                type: string
              taskRef:
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}

---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: subtasks.tatara.dev
spec:
  group: tatara.dev
  names:
    kind: Subtask
    listKind: SubtaskList
    plural: subtasks
    singular: subtask
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.order
      name: Order
      type: integer
    - jsonPath: .status.phase
      name: Phase
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Subtask is a unit of work fed to a Task's agent session one turn
          at a time.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              SubtaskSpec defines the desired state of a Subtask. Created/updated by the
              agent via the REST API and consumed by the Task reconciler's turn loop.
            properties:
              detail:
                type: string
              order:
                type: integer
              taskRef:
                type: string
              title:
                type: string

---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: projects.tatara.dev
spec:
  group: tatara.dev
  names:
    kind: Project
    listKind: ProjectList
    plural: projects
    singular: project
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.webhookURL
      name: Webhook
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Project is the top-level grouping for repositories and tasks.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ProjectSpec defines the desired state of a Project.
            properties:
              agent:
                description: AgentSpec configures the wrapper agent session a Task
                  runs.
                properties:
                  contextWindowTokens:
                    default: 200000
                    type: integer
                  effort:
                    default: xhigh
                    description: |-
                      Effort is the reasoning-effort level passed to the wrapper agent as the
                      EFFORT env var (the "ultracode" lever). Highest by default.
                    enum:
                    - low
                    - medium
                    - high
                    - xhigh
                    - max
                    type: string
                  env:
                    description: |-
                      Env are additional environment variables injected into the wrapper
                      container, appended after the operator's own variables. Secret material is
                      supplied via valueFrom.secretKeyRef so the operator never handles plaintext
                      (the same model the built-in agent secrets use).
                    items:
                      description: EnvVar represents an environment variable present
                        in a Container.
                      properties:
                        name:
                          description: |-
                            Name of the environment variable.
                            May consist of any printable ASCII characters except '='.
                          type: string
                        value:
                          description: |-
                            Variable references $(VAR_NAME) are expanded
                            using the previously defined environment variables in the container and
                            any service environment variables. If a variable cannot be resolved,
                            the reference in the input string will be unchanged. Double $$ are reduced
                            to a single $, which allows for escaping the $(VAR_NAME) syntax: i.e.
                            "$$(VAR_NAME)" will produce the string literal "$(VAR_NAME)".
                            Escaped references will never be expanded, regardless of whether the variable
                            exists or not.
                            Defaults to "".
                          type: string
                        valueFrom:
                          description: Source for the environment variable's value.
                            Cannot be used if value is not empty.
                          properties:
                            configMapKeyRef:
                              description: Selects a key of a ConfigMap.
                              properties:
                                key:
                                  description: The key to select.
                                  type: string
                                name:
                                  default: ""
                                  description: |-
                                    Name of the referent.
                                    This field is effectively required, but due to backwards compatibility is
                                    allowed to be empty. Instances of this type with an empty value here are
                                    almost certainly wrong.
                                    More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                  type: string
                                optional:
                                  description: Specify whether the ConfigMap or its
                                    key must be defined
                                  type: boolean
                              required:
                              - key
                              type: object
                              x-kubernetes-map-type: atomic
                            fieldRef:
                              description: |-
                                Selects a field of the pod: supports metadata.name, metadata.namespace, `metadata.labels['<KEY>']`, `metadata.annotations['<KEY>']`,
                                spec.nodeName, spec.serviceAccountName, status.hostIP, status.podIP, status.podIPs.
                              properties:
                                apiVersion:
                                  description: Version of the schema the FieldPath
                                    is written in terms of, defaults to "v1".
                                  type: string
                                fieldPath:
                                  description: Path of the field to select in the
                                    specified API version.
                                  type: string
                              required:
                              - fieldPath
                              type: object
                              x-kubernetes-map-type: atomic
                            fileKeyRef:
                              description: |-
                                FileKeyRef selects a key of the env file.
                                Requires the EnvFiles feature gate to be enabled.
                              properties:
                                key:
                                  description: |-
                                    The key within the env file. An invalid key will prevent the pod from starting.
                                    The keys defined within a source may consist of any printable ASCII characters except '='.
                                    During Alpha stage of the EnvFiles feature gate, the key size is limited to 128 characters.
                                  type: string
                                optional:
                                  default: false
                                  description: |-
                                    Specify whether the file or its key must be defined. If the file or key
                                    does not exist, then the env var is not published.
                                    If optional is set to true and the specified key does not exist,
                                    the environment variable will not be set in the Pod's containers.

                                    If optional is set to false and the specified key does not exist,
                                    an error will be returned during Pod creation.
                                  type: boolean
                                path:
                                  description: |-
                                    The path within the volume from which to select the file.
                                    Must be relative and may not contain the '..' path or start with '..'.
                                  type: string
                                volumeName:
                                  description: The name of the volume mount containing
                                    the env file.
                                  type: string
                              required:
                              - key
                              - path
                              - volumeName
                              type: object
                              x-kubernetes-map-type: atomic
                            resourceFieldRef:
                              description: |-
                                Selects a resource of the container: only resources limits and requests
                                (limits.cpu, limits.memory, limits.ephemeral-storage, requests.cpu, requests.memory and requests.ephemeral-storage) are currently supported.
                              properties:
                                containerName:
                                  description: 'Container name: required for volumes,
                                    optional for env vars'
                                  type: string
                                divisor:
                                  anyOf:
                                  - type: integer
                                  - type: string
                                  description: Specifies the output format of the
                                    exposed resources, defaults to "1"
                                  pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                                  x-kubernetes-int-or-string: true
                                resource:
                                  description: 'Required: resource to select'
                                  type: string
                              required:
                              - resource
                              type: object
                              x-kubernetes-map-type: atomic
                            secretKeyRef:
                              description: Selects a key of a secret in the pod's
                                namespace
                              properties:
                                key:
                                  description: The key of the secret to select from.  Must
                                    be a valid secret key.
                                  type: string
                                name:
                                  default: ""
                                  description: |-
                                    Name of the referent.
                                    This field is effectively required, but due to backwards compatibility is
                                    allowed to be empty. Instances of this type with an empty value here are
                                    almost certainly wrong.
                                    More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                  type: string
                                optional:
                                  description: Specify whether the Secret or its key
                                    must be defined
                                  type: boolean
                              required:
                              - key
                              type: object
                              x-kubernetes-map-type: atomic
                          type: object
                      required:
                      - name
                      type: object
                    type: array
                  handoverThresholdPercent:
                    default: 50
                    type: integer
                  image:
                    type: string
                  maxLifecycleIterations:
                    default: 10
                    minimum: 3
                    type: integer
                  maxTurnsPerTask:
                    default: 50
                    type: integer
                  mcpServers:
                    description: |-
                      MCPServers are additional MCP servers (beyond tatara itself) made available
                      to the agent. Each entry is rendered to one file in the wrapper's MCP overlay
                      dir (MCP_OVERLAY_DIR) and merged into the session .mcp.json at bootstrap.
                    items:
                      description: |-
                        MCPServer is one additional MCP server made available to the agent. ConfigJSON
                        is the server's MCP config object as a JSON string (the value of one entry
                        under .mcpServers in a .mcp.json file), e.g.
                        {"command":"npx","args":["-y","@modelcontextprotocol/server-github"]}.
                      properties:
                        configJson:
                          description: ConfigJSON is the server's MCP config as a
                            JSON object string.
                          minLength: 1
                          type: string
                        name:
                          description: |-
                            Name is the MCP server key as it appears under .mcpServers. Must be unique
                            within the list.
                          minLength: 1
                          type: string
                      required:
                      - configJson
                      - name
                      type: object
                    type: array
                    x-kubernetes-list-map-keys:
                    - name
                    x-kubernetes-list-type: map
                  model:
                    type: string
                  permissionMode:
                    default: bypassPermissions
                    type: string
                  plugins:
                    description: |-
                      Plugins are claude-code plugins to install before the session starts,
                      including from custom marketplace sources. Consumed by the wrapper at
                      bootstrap.
                    items:
                      description: |-
                        Plugin is a claude-code plugin to install at bootstrap. Source is the plugin
                        source: a marketplace plugin reference (e.g. "name@marketplace"), a git URL, or
                        any source the wrapper's plugin installer understands. Empty Source installs by
                        Name from the default marketplace.
                      properties:
                        name:
                          description: Name is the plugin name. Must be unique within
                            the list.
                          minLength: 1
                          type: string
                        source:
                          description: Source is where to install the plugin from
                            (marketplace ref, git URL, ...).
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                    x-kubernetes-list-map-keys:
                    - name
                    x-kubernetes-list-type: map
                  settings:
                    description: |-
                      Settings is a raw JSON object merged into the agent's claude-code
                      settings.json (e.g. maxParallelism and other claude-code knobs) on top of
                      the operator-managed model/effort/permission settings. Operator-managed keys
                      win on conflict. Unknown fields are preserved.
                    x-kubernetes-preserve-unknown-fields: true
                  skills:
                    description: |-
                      Skills are custom agent skills sourced from ConfigMaps the operator mounts
                      under the wrapper's skills source dir. Each referenced ConfigMap's keys
                      become files in a skill directory.
                    items:
                      description: |-
                        SkillSource references a ConfigMap whose keys are mounted as files of a custom
                        skill directory under the wrapper's skills source dir.
                      properties:
                        configMapRef:
                          description: |-
                            ConfigMapRef is the name of a ConfigMap in the operator namespace holding
                            the skill's files (e.g. SKILL.md and any helpers) as data keys.
                          minLength: 1
                          type: string
                        name:
                          description: Name is the skill directory name. Must be unique
                            within the list.
                          minLength: 1
                          type: string
                      required:
                      - configMapRef
                      - name
                      type: object
                    type: array
                    x-kubernetes-list-map-keys:
                    - name
                    x-kubernetes-list-type: map
                  systemPrompt:
                    description: |-
                      SystemPrompt is free-form text injected as the agent's starting prompt: the
                      operator renders it to a ConfigMap mounted at the wrapper's project CLAUDE.md
                      path (PROJECT_CLAUDE_MD_PATH). Empty means no custom prompt (existing
                      behaviour). Project-scoped: applies to every agent the Project spawns.
                    type: string
                  turnTimeoutSeconds:
                    default: 1800
                    description: |-
                      TurnTimeoutSeconds is the per-turn stall (inactivity) window in seconds: a
                      turn is failed only after this long with no agent activity, not at a fixed
                      wall-clock age, so a turn that keeps streaming output is not killed mid-work.
                      The name is kept for CRD compatibility.
                    type: integer
                type: object
              grafana:
                description: |-
                  GrafanaSpec configures the optional per-project Grafana incident-response
                  feature: an operator-provisioned read-only grafana-mcp and an alert-webhook
                  receiver. The feature is inert unless Enabled.
                properties:
                  cooldownSeconds:
                    default: 3600
                    description: |-
                      CooldownSeconds is DEPRECATED and no longer used: the per-alert-group refire
                      window was replaced by in-flight dedup (admission-time idempotency).
                      Retained for API compatibility; the value has no effect.
                    type: integer
                  enabled:
                    type: boolean
                  secretRef:
                    description: |-
                      SecretRef names a Secret holding the Grafana credentials. Keys:
                        serviceAccountToken - Grafana Viewer SA token (mounted into grafana-mcp)
                        webhookSecret       - static bearer the alert webhook must present
                    type: string
                  url:
                    description: URL is the Grafana base URL grafana-mcp queries (non-secret).
                    type: string
                required:
                - enabled
                type: object
              maxConcurrentTasks:
                default: 3
                type: integer
              maxOpenTasks:
                default: 3
                description: |-
                  MaxOpenTasks is the hard ceiling on non-terminal Tasks the operator will
                  autonomously create for this Project (cron scans + brainstorm). At the cap,
                  scan/brainstorm creation is skipped until open Tasks finish. The reactive
                  webhook path is exempt (human-initiated).
                type: integer
              memory:
                description: |-
                  MemorySpec configures the per-Project memory stack footprint. Defaults are
                  declared via +kubebuilder:default so they are enforced at admission and
                  visible in the persisted object; the internal/memory builders no longer need
                  to carry fallback constants.
                properties:
                  neo4jStorage:
                    default: 10Gi
                    type: string
                  pgInstances:
                    default: 1
                    type: integer
                  pgStorage:
                    default: 10Gi
                    type: string
                type: object
              queue:
                description: QueueSpec configures the in-operator agent-work admission
                  queue.
                properties:
                  alertCapacity:
                    description: 'AlertCapacity M: reserved concurrent slots for alert-class
                      events (default 1).'
                    type: integer
                  capacity:
                    description: |-
                      Capacity N: max concurrently-admitted normal-class events (defaults to
                      MaxConcurrentTasks, else 3).
                    type: integer
                  queuedAutonomousCap:
                    description: |-
                      QueuedAutonomousCap K: max Queued autonomous (cron) events; crons stop
                      enqueuing past it (defaults to MaxOpenTasks, else 3). Webhooks/alerts exempt.
                    type: integer
                type: object
              scm:
                description: ScmSpec binds a Project to one SCM provider and its board/merge
                  policy.
                properties:
                  approvalLabel:
                    default: tatara/awaiting-approval
                    description: |-
                      ApprovalLabel is DEPRECATED and no longer used: approval is now driven by
                      the conversation (the triage agent reads the thread) and projected onto the
                      idea/approved/rejected labels below. Kept only for migration tooling.
                    type: string
                  approvedLabel:
                    default: tatara-approved
                    description: ApprovedLabel marks an issue approved for implementation.
                    type: string
                  babysitDeadlineMinutes:
                    default: 60
                    type: integer
                  board:
                    description: BoardSpec configures the project board tatara participates
                      in.
                    properties:
                      githubProjectNumber:
                        type: integer
                      gitlabBoardId:
                        type: integer
                      statusField:
                        default: Status
                        type: string
                    type: object
                  botLogin:
                    type: string
                  brainstormingLabel:
                    default: tatara-brainstorming
                    description: BrainstormingLabel marks an issue tatara is triaging
                      / discussing (pre-approval).
                    type: string
                  conversationIdleMinutes:
                    default: 60
                    type: integer
                  cron:
                    description: ScmCron groups the cron-driven scan activities.
                    properties:
                      brainstorm:
                        description: BrainstormActivity schedules the opt-in self-driven
                          issue-proposal scan.
                        properties:
                          enabled:
                            type: boolean
                          maxOpenProposals:
                            default: 5
                            description: |-
                              MaxOpenProposals caps the total open, unapproved agent proposals across
                              ALL repos in the project; at or above this the brainstorm cycle is
                              skipped. Default 5.
                            type: integer
                          maxPerCycle:
                            default: 1
                            description: |-
                              Deprecated: MaxPerCycle is retained for API compatibility only. The controller
                              hard-caps brainstorm at one Task per project per cycle regardless of this value.
                              Setting it has no effect. See MEMORY.md for rationale.
                            type: integer
                          schedule:
                            pattern: ^$|^(\S+\s+){4}\S+$
                            type: string
                          sources:
                            items:
                              enum:
                              - docs
                              - memory
                              - internet
                              type: string
                            type: array
                        type: object
                      healthCheck:
                        description: |-
                          HealthCheckActivity schedules the opt-in periodic project-health-check scan:
                          a sibling to brainstorm that surveys repo health (CI failures, coverage gaps,
                          code to simplify, pipeline steps to add, other tech-debt) and proposes one
                          targeted discovery issue per cycle via the tatara-health-check skill.
                        properties:
                          enabled:
                            type: boolean
                          maxOpenProposals:
                            default: 5
                            description: |-
                              MaxOpenProposals caps the total open, unapproved agent proposals across
                              ALL repos in the project; at or above this the health-check cycle is
                              skipped. Default 5.
                            type: integer
                          schedule:
                            pattern: ^$|^(\S+\s+){4}\S+$
                            type: string
                          sources:
                            items:
                              enum:
                              - docs
                              - memory
                              - internet
                              type: string
                            type: array
                        type: object
                      issueScan:
                        description: CronActivity schedules one Project scan activity
                          (mrScan or issueScan).
                        properties:
                          maxPerRepo:
                            default: 1
                            description: MaxPerRepo caps the number of in-progress
                              Tasks per repo (one lane per repo).
                            minimum: 1
                            type: integer
                          schedule:
                            description: Schedule is a 5-field cron (robfig ParseStandard).
                              Empty disables this activity.
                            pattern: ^$|^(\S+\s+){4}\S+$
                            type: string
                        type: object
                      mrScan:
                        description: CronActivity schedules one Project scan activity
                          (mrScan or issueScan).
                        properties:
                          maxPerRepo:
                            default: 1
                            description: MaxPerRepo caps the number of in-progress
                              Tasks per repo (one lane per repo).
                            minimum: 1
                            type: integer
                          schedule:
                            description: Schedule is a 5-field cron (robfig ParseStandard).
                              Empty disables this activity.
                            pattern: ^$|^(\S+\s+){4}\S+$
                            type: string
                        type: object
                    type: object
                  declinedLabel:
                    default: tatara-declined
                    description: DeclinedLabel marks an issue declined before implementation
                      (triage reject).
                    type: string
                  ideaLabel:
                    default: tatara-idea
                    description: IdeaLabel is DEPRECATED (legacy alias for BrainstormingLabel);
                      kept for lazy migration.
                    type: string
                  implementationLabel:
                    default: tatara-implementation
                    description: ImplementationLabel marks an issue whose implementation
                      is in flight.
                    type: string
                  maintainerLogins:
                    description: |-
                      MaintainerLogins are the human maintainer accounts. Together with BotLogin
                      they form the "trusted insider" set: issues opened by anyone OUTSIDE this
                      set (third-party contributors) are autoapproved through triage without the
                      self-approve hold. Empty means only BotLogin is excluded from autoapprove.
                    items:
                      type: string
                    type: array
                  mergePolicy:
                    default: afterApproval
                    enum:
                    - afterApproval
                    - autoMergeOnGreenCI
                    type: string
                  owner:
                    type: string
                  prReactionScope:
                    default: labeledOrMentioned
                    enum:
                    - labeledOrMentioned
                    - all
                    type: string
                  priorityLabel:
                    type: string
                  provider:
                    enum:
                    - github
                    - gitlab
                    type: string
                  rejectedLabel:
                    default: tatara-rejected
                    description: RejectedLabel is DEPRECATED (legacy alias for DeclinedLabel);
                      kept for lazy migration.
                    type: string
                required:
                - botLogin
                - owner
                - provider
                type: object
              scmSecretRef:
                type: string
              triggerLabel:
                default: tatara
                type: string
            required:
            - scmSecretRef
            type: object
          status:
            description: ProjectStatus defines the observed state of a Project.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              grafana:
                description: GrafanaStatus reports the observed state of the per-Project
                  grafana-mcp.
                properties:
                  endpoint:
                    type: string
                  phase:
                    type: string
                type: object
              lastBrainstorm:
                format: date-time
                type: string
              lastHealthCheck:
                format: date-time
                type: string
              lastIssueScan:
                format: date-time
                type: string
              lastMRScan:
                format: date-time
                type: string
              memory:
                description: |-
                  MemoryStatus reports the observed state of the per-Project memory stack.
                  Endpoint is the canonical in-cluster URL every other component reads.
                properties:
                  endpoint:
                    type: string
                  externalEndpoint:
                    type: string
                  phase:
                    type: string
                type: object
              webhookURL:
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
